name: Update MMO Calendar

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:        # allow manual runs

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 icalendar python-dateutil

      - name: Generate calendars
        run: python generate_calendar.py

      - name: Commit updated calendars
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ffxiv.ics pso2.ics
          git diff --cached --quiet || git commit -m "chore: update calendars [$(date -u +%Y-%m-%d)]"
          git push
